# n8n Workflow Automation
# Complete docker-compose configuration with PostgreSQL

services:
  n8n:
    image: docker.n8n.io/n8nio/n8n
    container_name: n8n
    restart: unless-stopped
    
    environment:
      # Base URLs
      N8N_EDITOR_BASE_URL: 'https://n8n.example.com'
      WEBHOOK_URL: 'https://n8n.example.com'
      N8N_HOST: 'https://n8n.example.com'
      
      # Timezone
      GENERIC_TIMEZONE: 'Europe/Helsinki'
      TZ: 'Europe/Helsinki'
      
      # Database configuration
      DB_TYPE: postgresdb
      DB_POSTGRESDB_DATABASE: 'n8n'
      DB_POSTGRESDB_HOST: postgresql
      DB_POSTGRESDB_PORT: '5432'
      DB_POSTGRESDB_USER: 'n8n_user'
      DB_POSTGRESDB_PASSWORD: 'CHANGE_ME_STRONG_PASSWORD'
      DB_POSTGRESDB_SCHEMA: public
      
      # Execution mode
      EXECUTIONS_MODE: 'regular'
      
      # Optional: Enable basic auth (remove for production with proper auth)
      # N8N_BASIC_AUTH_ACTIVE: 'true'
      # N8N_BASIC_AUTH_USER: 'admin'
      # N8N_BASIC_AUTH_PASSWORD: 'CHANGE_ME'
    
    volumes:
      - n8n-data:/home/node/.n8n
    
    depends_on:
      postgresql:
        condition: service_healthy
    
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:5678/"]
      interval: 5s
      timeout: 20s
      retries: 10
    
    networks:
      - n8n-network
    
    labels:
      # Enable Traefik
      - traefik.enable=true
      
      # HTTP router (redirect to HTTPS)
      - traefik.http.routers.n8n-http.entryPoints=http
      - traefik.http.routers.n8n-http.rule=Host(`n8n.example.com`)
      - traefik.http.routers.n8n-http.middlewares=redirect-to-https
      
      # HTTPS router
      - traefik.http.routers.n8n-https.entryPoints=https
      - traefik.http.routers.n8n-https.rule=Host(`n8n.example.com`)
      - traefik.http.routers.n8n-https.tls.certresolver=letsencrypt
      - traefik.http.routers.n8n-https.middlewares=gzip
      
      # Service definition
      - traefik.http.services.n8n.loadbalancer.server.port=5678
      
      # Middleware definitions
      - traefik.http.middlewares.redirect-to-https.redirectscheme.scheme=https
      - traefik.http.middlewares.gzip.compress=true

  postgresql:
    image: postgres:16-alpine
    container_name: n8n-postgres
    restart: unless-stopped
    
    environment:
      POSTGRES_USER: 'n8n_user'
      POSTGRES_PASSWORD: 'CHANGE_ME_STRONG_PASSWORD'
      POSTGRES_DB: 'n8n'
    
    volumes:
      - postgresql-data:/var/lib/postgresql/data
    
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U n8n_user -d n8n"]
      interval: 5s
      timeout: 20s
      retries: 10
    
    networks:
      - n8n-network

volumes:
  n8n-data:
    name: n8n-data
  postgresql-data:
    name: n8n-postgresql-data

networks:
  n8n-network:
    name: n8n-network
    driver: bridge
